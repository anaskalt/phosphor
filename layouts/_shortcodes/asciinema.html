{{- /* Usage: {{< asciinema 569727 >}}  or  {{< asciinema id="569727" >}} */ -}}
{{- $id := or (.Get "id") (.Get 0) -}}
{{- if $id -}}
<div class="asciinema">
  <script async id="asciicast-{{ $id }}" src="https://asciinema.org/a/{{ $id }}.js"></script>
</div>
{{- else -}}
  {{- errorf "asciinema shortcode: missing cast id (%s)" .Position -}}
{{- end -}}
